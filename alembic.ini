[alembic]
script_location = backend/alembic
sqlalchemy.url = postgresql+psycopg://eits:eits_dev_password@localhost:5432/eits

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname = root

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)s %(message)s

