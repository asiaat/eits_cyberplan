services:
  backend:
    working_dir: /app/backend
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

  frontend:
    working_dir: /app/frontend
    environment:
      - NODE_ENV=development
      - VITE_API_URL=/api/v2
    extra_hosts:
      - "host.docker.internal:172.18.0.1"