services:
  postgres:
    image: postgres:16-alpine
    container_name: eits_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eits}
      POSTGRES_USER: ${POSTGRES_USER:-eits}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eits}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eits_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: eits_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: eits_backend
    environment:
      APP_ENV: ${APP_ENV:-staging}
      APP_NAME: ${APP_NAME:-eits-cyberplan}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-eits}
      POSTGRES_USER: ${POSTGRES_USER:-eits}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-eits}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-eits}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-eits-evidence}
      MINIO_SECURE: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: .venv/bin/python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000

  nginx:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v2}
    container_name: eits_nginx
    ports:
      - "${HTTP_PORT:-5071}:80"
      - "${HTTPS_PORT:-5471}:443"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
