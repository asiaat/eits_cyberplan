<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-ITS Database Schema — v0.1.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;overflow:hidden;height:100vh;user-select:none}
#toolbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:#16213e;padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #0f3460;box-shadow:0 2px 8px rgba(0,0,0,.4)}
#toolbar h1{font-size:16px;font-weight:600;color:#e94560;white-space:nowrap}
#toolbar .sep{width:1px;height:28px;background:#0f3460}
#toolbar input{padding:6px 12px;border-radius:6px;border:1px solid #0f3460;background:#1a1a2e;color:#e0e0e0;font-size:13px;width:240px;outline:none;transition:border-color .2s}
#toolbar input:focus{border-color:#e94560}
#toolbar label{font-size:12px;color:#888;display:flex;align-items:center;gap:6px;cursor:pointer}
#toolbar label input{cursor:pointer;width:auto}
#toolbar .zoom-info{font-size:12px;color:#888;margin-left:auto;white-space:nowrap}
#toolbar .hint{font-size:11px;color:#555;white-space:nowrap;margin-left:8px}
#canvas{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;background:#1a1a2e;background-image:radial-gradient(circle,#ffffff08 1px,transparent 1px);background-size:24px 24px}
#canvas:active{cursor:grabbing}
#world{transform-origin:0 0;position:absolute}
svg.rels{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:visible}
svg.rels .rel-line{stroke:var(--rel-color,#0f3460);stroke-width:1;fill:none;stroke-linejoin:round}
svg.rels .rel-fk{font-size:9px;fill:#889;font-family:'SF Mono',Consolas,monospace}
svg.rels .rel-role{font-size:9px;fill:#e0e0e0;font-family:'SF Mono',Consolas,monospace}
svg.rels .rel-mult{font-size:9px;fill:#e94560;font-weight:700;font-family:'SF Mono',Consolas,monospace}
.table-card{position:absolute;z-index:2;background:#16213e;border-radius:8px;border:1px solid #0f3460;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:box-shadow .2s,opacity .3s;min-width:260px;max-width:320px}
.table-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.5);z-index:10}
.table-card.dimmed{opacity:.15}
.table-card.highlighted{opacity:1;border-color:#e94560!important;box-shadow:0 0 20px #e9456040}
.table-card .header{padding:8px 12px;cursor:move;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08)}
.table-card .header .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.table-card .header .cnt{font-size:10px;font-weight:400;opacity:.5;margin-left:8px;white-space:nowrap}
.table-card .col{padding:3px 12px;font-size:11.5px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,.04);line-height:1.6}
.table-card .col:last-child{border-bottom:none}
.table-card .col .pk{background:#e94560;color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;letter-spacing:.3px}
.table-card .col .fk{background:#0f3460;color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;letter-spacing:.3px}
.table-card .col .pkfk{background:#533483;color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;letter-spacing:.3px}
.table-card .col .type{color:#888;font-size:10px;margin-left:auto;font-family:'SF Mono',Consolas,monospace;white-space:nowrap}
.table-card .col .name{color:#e0e0e0;font-weight:400}
.tier-A .header{border-left:3px solid #3b82f6}
.tier-B .header{border-left:3px solid #22c55e}
.tier-CATALOG .header{border-left:3px solid #a855f7}
.tier-CORE .header{border-left:3px solid #f59e0b}
.tier-IMR .header{border-left:3px solid #ec4899}
.tier-RISK .header{border-left:3px solid #ef4444}
.tier-EVIDENCE .header{border-left:3px solid #06b6d4}
.tier-SUPPORT .header{border-left:3px solid #64748b}
.tier-LEGACY .header{border-left:3px solid #78716c}
#legend{position:fixed;bottom:16px;left:16px;z-index:100;background:#16213ee0;backdrop-filter:blur(8px);padding:10px 14px;border-radius:8px;border:1px solid #0f3460;font-size:11px;display:flex;flex-wrap:wrap;gap:6px 14px;pointer-events:none}
#legend .item{display:flex;align-items:center;gap:6px}
#legend .dot{width:10px;height:10px;border-radius:50%}
#status{position:fixed;bottom:16px;right:16px;z-index:100;font-size:11px;color:#555;background:#16213ee0;backdrop-filter:blur(8px);padding:6px 12px;border-radius:6px;border:1px solid #0f3460;pointer-events:none}
</style>
</head>
<body>

<div id="toolbar">
  <h1>E-ITS Schema</h1>
  <div class="sep"></div>
  <input id="search" type="text" placeholder="Search tables or columns..." autocomplete="off">
  <div class="sep"></div>
  <label><input type="checkbox" id="showRels" checked>Relationships</label>
  <span class="zoom-info" id="zoomInfo">100%</span>
  <span class="hint">Scroll=zoom · Drag=pan · Drag table=move</span>
</div>

<div id="canvas">
  <div id="world"></div>
</div>

<div id="legend"></div>
<div id="status"></div>

<script>
const TIERS = {
  A:        { label: 'Tier A — Subscription',      color: '#3b82f6', order: 0 },
  B:        { label: 'Tier B — IAM & Roles',        color: '#22c55e', order: 1 },
  CATALOG:  { label: 'E-ITS Catalog',               color: '#a855f7', order: 2 },
  CORE:     { label: 'Core Business',               color: '#f59e0b', order: 3 },
  IMR:      { label: 'IMR — Implementation',        color: '#ec4899', order: 4 },
  RISK:     { label: 'Risk Register',               color: '#ef4444', order: 5 },
  EVIDENCE: { label: 'Evidence',                    color: '#06b6d4', order: 6 },
  SUPPORT:  { label: 'Supporting',                  color: '#64748b', order: 7 },
  LEGACY:   { label: 'Legacy (migrating)',           color: '#78716c', order: 8 },
};

// ─── SCHEMA DATA ────────────────────────────────────────────────
const T = (name, tier, comment, cols) => ({ name, tier, comment, columns: cols });
const c = (name, type, flags, def) => {
  const col = { name, type };
  if (flags) {
    if (flags.includes('pk')) col.pk = true;
    if (flags.includes('fk')) col.fk = true;
    if (flags.includes('ix')) col.ix = true;
    if (flags.includes('uq')) col.uq = true;
  }
  if (def) col.default = def;
  return col;
};

const SCHEMA = [
  // ── Tier A ──
  T('app_tenants', 'A', 'Organization / tenant subscription', [
    c('id','UUID','pk'), c('name','VARCHAR(255)'), c('status','VARCHAR(50)',0,'active'),
    c('plan','VARCHAR(50)'), c('registry_code','VARCHAR(50)'), c('legal_form','VARCHAR(255)'),
    c('registered_address','VARCHAR(500)'), c('phone','VARCHAR(50)'), c('email','VARCHAR(255)'),
    c('divisions','JSON'), c('created_at','DateTime'),
  ]),
  T('global_users', 'A', 'Central identity (cross-tenant)', [
    c('id','UUID','pk'), c('email','VARCHAR(255)','uq ix'), c('password_hash','VARCHAR(255)'),
    c('mfa_enabled','Boolean',0,'false'), c('mfa_secret','VARCHAR(255)'), c('created_at','DateTime'),
  ]),
  T('tenant_users', 'A', 'Maps global user to tenant subscription', [
    c('tenant_id','UUID','pk fk',null,'app_tenants'), c('user_id','UUID','pk fk',null,'global_users'),
    c('assigned_at','DateTime',0,'now()'),
  ]),

  // ── Tier B ──
  T('local_users', 'B', 'Per-tenant user profile', [
    c('id','UUID','pk'), c('global_user_id','UUID','fk',null,'global_users'), c('tenant_id','UUID','fk ix',null,'app_tenants'),
    c('full_name','VARCHAR(255)'), c('department','VARCHAR(100)'), c('is_active','Boolean',0,'true'),
    c('created_at','DateTime',0,'now()'),
  ]),
  T('e_its_roles', 'B', 'E-ITS standard roles', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk',null,'app_tenants'), c('role_name','VARCHAR(100)'),
    c('description','Text'),
  ]),
  T('user_roles', 'B', 'User role assignments', [
    c('id','UUID','pk'), c('user_id','UUID','fk',null,'local_users'), c('role_id','UUID','fk',null,'e_its_roles'),
    c('granted_by','UUID','fk',null,'local_users'), c('granted_at','DateTime',0,'now()'),
  ]),
  T('e_its_role_permissions', 'B', 'E-ITS role → permission junction', [
    c('role_id','UUID','pk fk',null,'e_its_roles'), c('permission_id','Text','pk fk',null,'permissions'),
  ]),

  // ── CATALOG ──
  T('eits_catalog_versions', 'CATALOG', 'E-ITS catalog version metadata', [
    c('id','UUID','pk'), c('version','VARCHAR(50)'), c('year','VARCHAR(4)'), c('name','VARCHAR(100)'),
    c('source_name','VARCHAR(255)'), c('source_file_hash','VARCHAR(64)'), c('active','Boolean',0,'false'),
    c('is_active','Boolean',0,'false'), c('released_at','Date'), c('imported_at','DateTime',0,'now()'),
  ]),
  T('eits_modules', 'CATALOG', 'E-ITS module', [
    c('id','UUID','pk'), c('catalog_version_id','UUID','fk',null,'eits_catalog_versions'), c('code','VARCHAR(50)'),
    c('name','VARCHAR(255)'), c('module_group','VARCHAR(10)'), c('category','VARCHAR(100)'),
    c('description','Text'), c('module_type','VARCHAR(50)'), c('source_url','VARCHAR(500)'),
  ]),
  T('eits_measures', 'CATALOG', 'E-ITS measure definition', [
    c('id','UUID','pk'), c('catalog_version_id','UUID','fk',null,'eits_catalog_versions'), c('code','VARCHAR(50)'),
    c('title','VARCHAR(255)'), c('description','Text'), c('measure_level','VARCHAR(50)'),
    c('responsible_role','VARCHAR(100)'), c('implementation_guidance','Text'),
  ]),
  T('eits_module_measures', 'CATALOG', 'Module ↔ measure association', [
    c('id','UUID','pk'), c('module_id','UUID','fk',null,'eits_modules'), c('measure_id','UUID','fk',null,'eits_measures'),
  ]),
  T('eits_catalog_measures', 'CATALOG', 'Catalog measure with level (v2)', [
    c('id','UUID','pk'), c('module_id','UUID','fk',null,'eits_modules'), c('code','VARCHAR(30)'),
    c('name','VARCHAR(255)'), c('measure_level','VARCHAR(10)'), c('description','Text'),
    c('responsible_role','VARCHAR(100)'),
  ]),
  T('eits_threats', 'CATALOG', 'E-ITS threat catalog', [
    c('id','UUID','pk'), c('version_id','UUID','fk',null,'eits_catalog_versions'), c('code','VARCHAR(30)'),
    c('category','VARCHAR(100)'), c('impact_area','VARCHAR(100)'), c('name','VARCHAR(255)'), c('description','Text'),
  ]),
  T('module_threats', 'CATALOG', 'Module ↔ threat association', [
    c('id','UUID','pk'), c('module_id','UUID','fk',null,'eits_modules'), c('threat_id','UUID','fk',null,'eits_threats'),
    c('relevance_note','Text'),
  ]),
  T('damage_scenarios', 'CATALOG', 'Fixed damage scenarios KS1–KS6', [
    c('id','UUID','pk'), c('code','VARCHAR(10)','uq'), c('name','VARCHAR(255)'), c('description','Text'),
  ]),
  T('asset_type_categories', 'CATALOG', 'T/V/I/R/A asset types', [
    c('id','UUID','pk'), c('code','VARCHAR(5)','uq'), c('name','VARCHAR(100)'), c('description','Text'),
  ]),

  // ── CORE: Business Processes & Assets ──
  T('business_processes', 'CORE', 'Business process', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk ix',null,'app_tenants'), c('owner_user_id','UUID','fk',null,'local_users'),
    c('division_id','UUID'), c('name','VARCHAR(255)'), c('description','Text'), c('purpose','Text'),
    c('inputs','Text'), c('outputs','Text'), c('status','VARCHAR(50)',0,'active'),
    c('confidentiality_need','VARCHAR(20)',0,'normal'), c('integrity_need','VARCHAR(20)',0,'normal'),
    c('availability_need','VARCHAR(20)',0,'normal'), c('process_type','VARCHAR(50)'), c('priority','VARCHAR(20)'),
    c('created_at','DateTime',0,'now()'), c('updated_at','DateTime',0,'now()'),
  ]),
  T('business_process_dependencies', 'CORE', 'Process-to-process dependencies', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk',null,'app_tenants'), c('primary_process_id','UUID','fk',null,'business_processes'),
    c('depends_on_process_id','UUID','fk',null,'business_processes'), c('dependency_type','VARCHAR(50)'), c('description','Text'),
    c('created_at','DateTime',0,'now()'),
  ]),
  T('assets', 'CORE', 'Information asset', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk ix',null,'app_tenants'), c('owner_user_id','UUID','fk',null,'users'),
    c('person_id','UUID','fk ix',null,'persons'), c('asset_category','UUID','fk',null,'asset_type_categories'),
    c('name','VARCHAR(255)'), c('asset_type','VARCHAR(50)'), c('description','Text'), c('criticality','VARCHAR(20)',0,'normal'),
    c('confidentiality_need','VARCHAR(20)',0,'normal'), c('integrity_need','VARCHAR(20)',0,'normal'),
    c('availability_need','VARCHAR(20)',0,'normal'), c('lifecycle_status','VARCHAR(50)',0,'active'),
    c('location','VARCHAR(255)'), c('protection_need','VARCHAR(20)'), c('protection_need_just','Text'),
    c('protection_source_ids','ARRAY(UUID)'), c('is_grouped','Boolean',0,'false'), c('quantity','Integer',0,1),
    c('group_name','VARCHAR(255)'), c('is_core','Boolean',0,'false'), c('asset_index','Integer'),
    c('remarks','Text'), c('created_at','DateTime',0,'now()'), c('updated_at','DateTime',0,'now()'),
  ]),
  T('asset_relation_types', 'CORE', 'Asset relation type catalog', [
    c('id','UUID','pk'), c('code','VARCHAR(50)','uq ix'), c('name','VARCHAR(255)'), c('description','Text'),
    c('source_types','VARCHAR(500)'), c('target_types','VARCHAR(500)'), c('bidirectional','Boolean',0,'false'),
    c('strength','VARCHAR(20)',0,'weak'), c('created_at','DateTime',0,'now()'),
  ]),
  T('asset_relations', 'CORE', 'Asset-to-asset relationships', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk ix',null,'app_tenants'), c('source_asset_id','UUID','fk',null,'assets'),
    c('target_asset_id','UUID','fk',null,'assets'), c('relation_type','VARCHAR(50)'), c('relation_type_code','VARCHAR(50)','fk',null,'asset_relation_types'),
    c('description','Text'), c('bidirectional','Boolean',0,'false'), c('strength','VARCHAR(20)',0,'weak'),
    c('created_at','DateTime',0,'now()'),
  ]),
  T('process_assets', 'CORE', 'Process ↔ asset association', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk ix',null,'app_tenants'), c('business_process_id','UUID','fk',null,'business_processes'),
    c('asset_id','UUID','fk',null,'assets'), c('relation_description','Text'),
  ]),

  // ── CORE: Module Mappings ──
  T('asset_module_mappings', 'CORE', 'E-ITS module mapping for assets', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk',null,'app_tenants'), c('asset_id','UUID','fk',null,'assets'),
    c('module_id','UUID','fk',null,'eits_modules'), c('justification','Text'), c('modeled_by','UUID','fk',null,'local_users'),
    c('modeled_at','DateTime',0,'now()'),
  ]),
  T('bp_module_mappings', 'CORE', 'E-ITS module mapping for business processes', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk',null,'app_tenants'), c('business_process_id','UUID','fk',null,'business_processes'),
    c('module_id','UUID','fk',null,'eits_modules'), c('justification','Text'), c('modeled_by','UUID','fk',null,'local_users'),
    c('modeled_at','DateTime',0,'now()'),
  ]),
  T('object_module_mappings', 'CORE', 'Generic object-to-module mapping', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk ix',null,'app_tenants'), c('target_type','VARCHAR(50)'), c('target_id','UUID'),
    c('module_id','UUID','fk',null,'eits_modules'), c('applicability','VARCHAR(50)',0,'pending'), c('rationale','Text'),
    c('selected_by_user_id','UUID','fk',null,'users'), c('selected_at','DateTime',0,'now()'),
  ]),
  T('process_module_assignments', 'CORE', 'Tenant-level module applicability', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk',null,'app_tenants'), c('module_id','UUID','fk',null,'eits_modules'),
    c('is_applicable','VARCHAR(1)',0,'1'), c('non_applicability_justification','Text'), c('assigned_by','UUID','fk',null,'local_users'),
    c('assigned_at','DateTime',0,'now()'),
  ]),
  T('security_profiles', 'CORE', 'Protection mode / security approach', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk',null,'app_tenants'), c('catalog_version_id','UUID','fk',null,'eits_catalog_versions'),
    c('security_approach','VARCHAR(20)',0,'BASIC'), c('approved_by','UUID','fk',null,'local_users'), c('approved_at','DateTime'),
    c('notes','Text'), c('created_at','DateTime',0,'now()'), c('updated_at','DateTime',0,'now()'),
  ]),
  T('protectionmode_selections', 'CORE', 'Protection mode with evidence (v2)', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk',null,'app_tenants'), c('catalog_version_id','UUID','fk',null,'eits_catalog_versions'),
    c('security_approach','VARCHAR(20)',0,'BASIC'), c('evidence_id','UUID','fk',null,'evidences'), c('approved_by','UUID','fk',null,'local_users'),
    c('approved_at','DateTime'), c('notes','Text'), c('is_active','Boolean',0,'true'), c('created_at','DateTime',0,'now()'), c('updated_at','DateTime',0,'now()'),
  ]),
  T('protection_need_summaries', 'CORE', 'Aggregated protection need', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk',null,'app_tenants'), c('business_process_id','UUID','fk',null,'business_processes'),
    c('protection_need','VARCHAR(20)',0,'NORMAL'), c('confidentiality_need','VARCHAR(20)',0,'NORMAL'),
    c('integrity_need','VARCHAR(20)',0,'NORMAL'), c('availability_need','VARCHAR(20)',0,'NORMAL'),
    c('justification','Text'), c('approved_by','UUID','fk',null,'local_users'), c('approved_at','DateTime'),
    c('created_at','DateTime',0,'now()'), c('updated_at','DateTime',0,'now()'),
  ]),
  T('damage_assessments', 'CORE', 'Damage assessment for protection need', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk',null,'app_tenants'), c('business_process_id','UUID','fk',null,'business_processes'),
    c('damage_scenario_id','UUID','fk',null,'damage_scenarios'), c('availability_impact','Integer',0,0),
    c('confidentiality_impact','Integer',0,0), c('integrity_impact','Integer',0,0), c('damage_category','Integer'),
    c('justification','Text'), c('assessed_by','UUID','fk',null,'local_users'), c('assessed_at','DateTime',0,'now()'),
  ]),
  T('damage_category_thresholds', 'CORE', 'Damage category descriptions per scenario', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk',null,'app_tenants'), c('damage_scenario_id','UUID','fk',null,'damage_scenarios'),
    c('negligible_description','Text'), c('limited_description','Text'), c('serious_description','Text'), c('catastrophic_description','Text'),
    c('approved_by','UUID','fk',null,'local_users'), c('created_at','DateTime',0,'now()'), c('updated_at','DateTime',0,'now()'),
  ]),

  // ── IMR ──
  T('imr_items', 'IMR', 'Implementation Maturity Review item (PEARO)', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk',null,'app_tenants'), c('asset_module_mapping_id','UUID','fk',null,'asset_module_mappings'),
    c('bp_module_mapping_id','UUID','fk',null,'bp_module_mappings'), c('measure_id','UUID','fk',null,'eits_catalog_measures'),
    c('is_process_module_measure','Boolean',0,'false'), c('pearo_status','VARCHAR(1)',0,'E'),
    c('implementation_description','Text'), c('non_implementation_justification','Text'), c('partial_scope_description','Text'),
    c('responsible_user_id','UUID','fk',null,'local_users'), c('due_date','Date'), c('next_review_date','Date'),
    c('priority','VARCHAR(5)',0,'P2'), c('risk_acceptance_approved_by','UUID','fk',null,'local_users'),
    c('risk_acceptance_date','DateTime'), c('verification_method','Text'), c('last_verified_at','DateTime'),
    c('imr_snapshot_id','UUID','fk ix',null,'imr_snapshots'), c('requirement_profile','VARCHAR(20)'), c('todo_description','Text'),
    c('cost_eur','Numeric(12,2)'), c('created_by','UUID','fk',null,'local_users'), c('updated_by','UUID','fk',null,'local_users'),
    c('status_changed_at','DateTime'), c('created_at','DateTime',0,'now()'), c('updated_at','DateTime',0,'now()'),
  ]),
  T('imr_snapshots', 'IMR', 'IMR snapshot for versioning', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk',null,'app_tenants'), c('protection_mode_selection_id','UUID','fk',null,'protectionmode_selections'),
    c('label','VARCHAR(255)'), c('description','Text'), c('is_current','Boolean',0,'false'), c('item_count','Integer',0,0),
    c('created_by','UUID','fk',null,'local_users'), c('restored_from','UUID'), c('created_at','DateTime',0,'now()'),
  ]),
  T('implementation_plan_items', 'IMR', 'Legacy IMR implementation plan', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk ix',null,'app_tenants'), c('measure_id','UUID','fk',null,'eits_measures'),
    c('target_type','VARCHAR(50)'), c('target_id','UUID'), c('owner_user_id','UUID','fk',null,'users'),
    c('status','VARCHAR(50)',0,'not_started'), c('priority','VARCHAR(20)',0,'medium'), c('due_date','DateTime'),
    c('implementation_comment','Text'), c('verification_method','Text'), c('accepted_risk_id','UUID'),
    c('created_at','DateTime',0,'now()'), c('updated_at','DateTime',0,'now()'),
  ]),

  // ── RISK ──
  T('risks', 'RISK', 'Risk register entry', [
    c('id','UUID','pk'), c('tenant_id','UUID','fk ix',null,'app_tenants'), c('title','VARCHAR(255)'), c('scenario','Text'),
    c('target_type','VARCHAR(50)'), c('target_id','UUID'), c('threat','Text'), c('vulnerability','Text'),
    c('likelihood','VARCHAR(20)'), c('impact','VARCHAR(20)'), c('risk_level','VARCHAR(20)'), c('treatment','VARCHAR(50)'),

// ─── RENDER ──────────────────────────────────────────────────────
const world = document.getElementById('world');
const searchInput = document.getElementById('search');
const showRelsCheck = document.getElementById('showRels');
const zoomInfo = document.getElementById('zoomInfo');
const statusEl = document.getElementById('status');

let scale = 0.6;
let panX = 40, panY = 40;
let isPanning = false, startX, startY, startPanX, startPanY;
let draggedTable = null, dragOffX, dragOffY;
let tableEls = {};
let tableData = {};
let hoveredTable = null;

// Layout: compute positions by tier
const GUTTER_X = 50, GUTTER_Y = 30;
const TIER_GAP_X = 36, TIER_GAP_Y = 50;
const COL_WIDTH = 280;
const TIER_ORDER = ['A','B','CATALOG','CORE','IMR','RISK','EVIDENCE','SUPPORT','LEGACY'];

// Group tables by tier
const byTier = {};
SCHEMA.forEach(t => {
  if (!byTier[t.tier]) byTier[t.tier] = [];
  byTier[t.tier].push(t);
});

// Assign positions
let cursorY = 0;
const positions = {};
TIER_ORDER.forEach(tier => {
  const tables = byTier[tier] || [];
  if (!tables.length) return;
  // Each tier gets one column; if too many tables, split into multiple cols
  const perCol = 10;
  let x = cursorY === 0 ? 12 : cursorY + TIER_GAP_X;
  let col = 0, row = 0;
  tables.forEach((t, i) => {
    const colIdx = Math.floor(i / perCol);
    const rowIdx = i % perCol;
    positions[t.name] = {
      x: x + colIdx * (COL_WIDTH + 50),
      y: 20 + rowIdx * GUTTER_Y,
    };
  });
  cursorY = Math.max(cursorY, x + (Math.ceil(tables.length / perCol)) * (COL_WIDTH + 50));
});

// Recalculate positions based on actual table heights
function calcHeights(tables) {
  let y = 0;
  tables.forEach(t => {
    const h = 36 + t.columns.length * 26 + 6;
    positions[t.name].h = h;
    y = Math.max(y, positions[t.name].y + h);
  });
}
TIER_ORDER.forEach(tier => {
  const tables = byTier[tier] || [];
  if (tables.length) calcHeights(tables);
});

function createTableCard(t) {
  const el = document.createElement('div');
  el.className = `table-card tier-${t.tier}`;
  el.dataset.table = t.name;

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'header';
  hdr.innerHTML = `<span class="name">${t.name}</span><span class="cnt">${t.columns.length}</span>`;
  el.appendChild(hdr);

  // Columns
  t.columns.forEach(col => {
    const row = document.createElement('div');
    row.className = 'col';
    let badges = '';
    if (col.pk) badges += '<span class="pk">PK</span> ';
    if (col.fk) badges += (col.pk ? '<span class="pkfk">FK</span>' : '<span class="fk">FK</span>');
    row.innerHTML = `${badges}<span class="name">${col.name}</span><span class="type">${col.type}</span>`;
    el.appendChild(row);
  });

  // Drag header
  hdr.addEventListener('mousedown', e => {
    e.stopPropagation();
    draggedTable = el;
    const rect = el.getBoundingClientRect();
    dragOffX = e.clientX - rect.left;
    dragOffY = e.clientY - rect.top;
    el.style.cursor = 'grabbing';
    el.style.zIndex = 100;
  });

  return el;
}

function render() {
  world.innerHTML = '';
  tableEls = {};
  tableData = {};

  // SVG overlay for relationships
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.classList.add('rels');
  svg.setAttribute('id','relSvg');
  world.appendChild(svg);

  // Render tables
  SCHEMA.forEach(t => {
    tableData[t.name] = t;
    const el = createTableCard(t);
    const p = positions[t.name];
    el.style.left = p.x + 'px';
    el.style.top = p.y + 'px';
    world.appendChild(el);
    tableEls[t.name] = el;
  });

  // Size world so SVG has a viewport
  let mX = 0, mY = 0;
  SCHEMA.forEach(t => {
    const p = positions[t.name];
    const h = p.h || 36 + t.columns.length * 26 + 6;
    mX = Math.max(mX, p.x + 320);
    mY = Math.max(mY, p.y + h + 80);
  });
  world.style.width = mX + 'px';
  world.style.height = mY + 'px';

  drawRelationships();
  updateLegend();
  updateStatus();
}

function drawRelationships() {
  const svg = document.getElementById('relSvg');
  if (!svg) return;
  const show = showRelsCheck.checked;
  svg.innerHTML = '';
  if (!show) return;

  RELS.forEach(([fromTable, fromCol, toTable, toCol]) => {
    if (fromTable === toTable) return;
    const fromEl = tableEls[fromTable];
    const toEl = tableEls[toTable];
    if (!fromEl || !toEl) return;

    const wR = world.getBoundingClientRect();
    const fR = fromEl.getBoundingClientRect(), tR = toEl.getBoundingClientRect();
    const fx1 = (fR.left - wR.left) / scale, fy1 = (fR.top - wR.top) / scale;
    const fx2 = fx1 + fR.width / scale, fy2 = fy1 + fR.height / scale;
    const tx1 = (tR.left - wR.left) / scale, ty1 = (tR.top - wR.top) / scale;
    const tx2 = tx1 + tR.width / scale, ty2 = ty1 + tR.height / scale;
    const fcx = (fx1 + fx2) / 2, fcy = (fy1 + fy2) / 2;
    const tcx = (tx1 + tx2) / 2, tcy = (ty1 + ty2) / 2;
    const dx = tcx - fcx, dy = tcy - fcy, aX = Math.abs(dx), aY = Math.abs(dy);

    let sx, sy, ex, ey, sDir, eDir;
    if (aX > aY) {
      if (dx > 0) { sx = fx2; sy = fcy; sDir = 'r'; ex = tx1; ey = tcy; eDir = 'l'; }
      else        { sx = fx1; sy = fcy; sDir = 'l'; ex = tx2; ey = tcy; eDir = 'r'; }
    } else {
      if (dy > 0) { sx = fcx; sy = fy2; sDir = 'd'; ex = tcx; ey = ty1; eDir = 'u'; }
      else        { sx = fcx; sy = fy1; sDir = 'u'; ex = tcx; ey = ty2; eDir = 'd'; }
    }

    const mid = aX > aY ? (sx + ex) / 2 : (sy + ey) / 2;
    const d = aX > aY
      ? `M ${sx} ${sy} L ${mid} ${sy} L ${mid} ${ey} L ${ex} ${ey}`
      : `M ${sx} ${sy} L ${sx} ${mid} L ${ex} ${mid} L ${ex} ${ey}`;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d); path.setAttribute('class', 'rel-line');
    svg.appendChild(path);

    // FK column name label
    const lb = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    if (aX > aY) {
      lb.setAttribute('x', Math.max(sx + 18, (sx + mid) / 2));
      lb.setAttribute('y', sy - 5);
    } else {
      lb.setAttribute('x', sx + 6);
      lb.setAttribute('y', Math.max(sy + 16, (sy + mid) / 2) + 3);
    }
    lb.setAttribute('class', 'rel-fk'); lb.textContent = fromCol;
    svg.appendChild(lb);

    // Multiplicity labels
    const mult = (el, x, y, txt, cls) => {
      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', x); t.setAttribute('y', y);
      t.setAttribute('class', cls); t.textContent = txt;
      el.appendChild(t);
    };

    if (aX > aY) {
      // * at FK side (near sx), 1 at PK side (near ex)
      mult(svg, (sDir === 'r' ? sx + 10 : sx - 20), sy + 13, '*', 'rel-mult');
      mult(svg, (eDir === 'l' ? ex - 10 : ex + 10), ey + 13, '1', 'rel-mult');
    } else {
      mult(svg, sx - 16, (sDir === 'd' ? sy + 14 : sy - 6), '*', 'rel-mult');
      mult(svg, ex - 16, (eDir === 'u' ? ey - 6 : ey + 14), '1', 'rel-mult');
    }
  });
}

function updateLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  TIER_ORDER.forEach(tier => {
    if (!byTier[tier] || !byTier[tier].length) return;
    const item = document.createElement('span');
    item.className = 'item';
    item.innerHTML = `<span class="dot" style="background:${TIERS[tier].color}"></span>${TIERS[tier].label}`;
    el.appendChild(item);
  });
}

function updateStatus() {
  statusEl.textContent = `${SCHEMA.length} tables · ${RELS.length} relationships`;
}

// ─── ZOOM / PAN ──────────────────────────────────────────────────
function applyTransform() {
  world.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  zoomInfo.textContent = Math.round(scale * 100) + '%';
  drawRelationships();
}

const canvas = document.getElementById('canvas');

canvas.addEventListener('mousedown', e => {
  if (e.target !== canvas && !e.target.closest('#canvas')) return;
  if (draggedTable) return;
  isPanning = true;
  startX = e.clientX;
  startY = e.clientY;
  startPanX = panX;
  startPanY = panY;
});

canvas.addEventListener('mousemove', e => {
  if (draggedTable) {
    const worldRect = world.getBoundingClientRect();
    const x = (e.clientX - worldRect.left - dragOffX) / scale;
    const y = (e.clientY - worldRect.top - dragOffY) / scale;
    draggedTable.style.left = x + 'px';
    draggedTable.style.top = y + 'px';
    const nm = draggedTable.dataset.table;
    if (nm && positions[nm]) { positions[nm].x = x; positions[nm].y = y; }
    drawRelationships();
    return;
  }
  if (!isPanning) return;
  panX = startPanX + (e.clientX - startX);
  panY = startPanY + (e.clientY - startY);
  applyTransform();
});

canvas.addEventListener('mouseup', () => {
  if (draggedTable) {
    draggedTable.style.cursor = '';
    draggedTable.style.zIndex = 2;
    draggedTable = null;
    drawRelationships();
  }
  isPanning = false;
});

canvas.addEventListener('mouseleave', () => {
  if (draggedTable) {
    draggedTable.style.cursor = '';
    draggedTable.style.zIndex = 2;
    draggedTable = null;
    drawRelationships();
  }
  isPanning = false;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.min(2, Math.max(0.15, scale * delta));
  // Zoom toward cursor
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX = mx - (mx - panX) * (newScale / scale);
  panY = my - (my - panY) * (newScale / scale);
  scale = newScale;
  applyTransform();
});

// ─── SEARCH ──────────────────────────────────────────────────────
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  Object.entries(tableEls).forEach(([name, el]) => {
    const t = tableData[name];
    const match = q === '' ||
      name.toLowerCase().includes(q) ||
      t.columns.some(c => c.name.toLowerCase().includes(q)) ||
      (t.comment && t.comment.toLowerCase().includes(q));
    el.classList.toggle('dimmed', q !== '' && !match);
    el.classList.toggle('highlighted', q !== '' && match);
  });
});

// ─── KEYBOARD ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    searchInput.value = '';
    searchInput.dispatchEvent(new Event('input'));
  }
  if (e.key === '0' && e.ctrlKey) {
    scale = 0.6; panX = 40; panY = 40;
    applyTransform();
  }
});

// ─── TOGGLE RELATIONSHIPS ────────────────────────────────────────
showRelsCheck.addEventListener('change', drawRelationships);

// ─── RESIZE ──────────────────────────────────────────────────────
const resizeObserver = new ResizeObserver(() => drawRelationships());
resizeObserver.observe(canvas);

// ─── INIT ────────────────────────────────────────────────────────
render();
applyTransform();
</script>

</body>
</html>
