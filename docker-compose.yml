services:
  postgres:
    image: postgres:16-alpine
    container_name: eits_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eits}
      POSTGRES_USER: ${POSTGRES_USER:-eits}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eits_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eits}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eits_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: eits_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: eits_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    # For development, mount source code for hot-reload without overriding .venv
    volumes:
      - ./backend/app:/app/backend/app
      - ./backend/alembic:/app/backend/alembic
      - ./backend/pyproject.toml:/app/backend/pyproject.toml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: .venv/bin/python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.dev.Dockerfile
    container_name: eits_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend


volumes:
  postgres_data:
  redis_data:
  minio_data: